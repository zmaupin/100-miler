[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Pin the build toolchain (Vite 5 needs Node 18+; older Netlify defaults break it).
[build.environment]
  NODE_VERSION = "20"

# /api/strava/callback -> netlify/functions/strava-callback, etc.
[[redirects]]
  from = "/api/strava/*"
  to = "/.netlify/functions/strava-:splat"
  status = 200

# SPA fallback — the two screens are client-routed.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
